<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>myCode - Secure Control Panel</title>
    <style>
        body {
            background-color: #FFFFFF;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 13px;
            color: #333;
            margin: 0;
            padding: 10px;
        }
        a {
            color: #0033CC;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        #header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 10px;
            margin-bottom: 15px;
        }
        #logo {
            font-size: 28px;
            font-weight: bold;
            color: #000;
            letter-spacing: -1px;
        }
        #logo span {
            background-color: #28a745;
            color: #FFF;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 2px;
        }
        .button-retro {
            background: #ECECEC;
            border: 1px solid #CCCCCC;
            border-bottom: 2px solid #999999;
            border-right: 2px solid #999999;
            color: #000;
            padding: 4px 12px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-left: 4px;
        }
        .button-retro:active {
            border: 1px solid #999999;
            border-top: 2px solid #666666;
            border-left: 2px solid #666666;
        }
        .container {
            max-width: 950px;
            margin: 0 auto;
        }
        .main-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }
        .box {
            border: 1px solid #D5E5F5;
            background-color: #F2F7FC;
            margin-bottom: 15px;
        }
        .box-header {
            background-color: #EAEAEA;
            border-bottom: 1px solid #D3D3D3;
            padding: 6px 8px;
            font-weight: bold;
            color: #444;
        }
        .box-content {
            padding: 10px;
        }
        .form-group {
            margin-bottom: 12px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .form-input, .form-textarea {
            width: 100%;
            border: 1px solid #7F9DB9;
            padding: 4px;
            box-sizing: border-box;
        }
        #login-overlay {
            max-width: 400px;
            margin: 100px auto;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        
        <div id="login-overlay" class="box" style="display: none;">
            <div class="box-header">🔒 Developer Key Access Verification</div>
            <div class="box-content">
                <form id="login-form">
                    <div class="form-group">
                        <label>SysOp Email Link:</label>
                        <input type="email" id="login-email" class="form-input" required placeholder="admin@mycode.co">
                    </div>
                    <div class="form-group">
                        <label>Security Keyphrase Matrix:</label>
                        <input type="password" id="login-password" class="form-input" required>
                    </div>
                    <button type="submit" class="button-retro" style="width: 100%; padding: 6px;">Mount Code File System</button>
                </form>
            </div>
        </div>

        <div id="admin-interface" style="display: none;">
            <div id="header-bar">
                <div id="logo">
                    <a href="index.html" style="color:black; text-decoration:none;">my<span>Code</span></a> 
                    <span style="font-size:14px; color:#666; font-weight:normal;">[Authenticated Repository Terminal]</span>
                </div>
                <div>
                    <button class="button-retro" onclick="handleLogout()" style="color: darkred;">Unmount Session ✖</button>
                    <a href="index.html" class="button-retro" style="text-decoration:none; color:black;">← Live Directory</a>
                </div>
            </div>

            <div class="main-layout">
                <div class="box">
                    <div class="box-header" id="form-panel-title">Initialize / Create Code Snippet Asset</div>
                    <div class="box-content">
                        <form id="code-form">
                            <div class="form-group">
                                <label>Script Entry Title:</label>
                                <input type="text" id="code-title" class="form-input" required placeholder="e.g., QuickSort Array Matrix Algorithm">
                            </div>
                            <div class="form-group">
                                <label>Target File Name:</label>
                                <input type="text" id="code-filename" class="form-input" required placeholder="e.g., quicksort.py">
                            </div>
                            <div class="form-group">
                                <label>Syntax Coding Language:</label>
                                <input type="text" id="code-lang" class="form-input" required placeholder="e.g., Python, JavaScript, C++">
                            </div>
                            <div class="form-group">
                                <label>Documentation Description Box:</label>
                                <textarea id="code-desc" rows="3" class="form-textarea" required placeholder="Type instructions or structural complexities here..."></textarea>
                            </div>
                            <div class="form-group">
                                <label>Raw Source Code Area Content:</label>
                                <textarea id="code-content" rows="12" class="form-textarea" style="font-family: monospace; background-color: #fafafa;" required placeholder="def algorithm():\n    return true"></textarea>
                            </div>
                            <div class="form-group">
                                <label>Algorithmic Complexity Weights:</label>
                                <select id="code-complexity" class="form-input" style="width: auto;">
                                    <option value="5">5 Bars (Extremely Complex)</option>
                                    <option value="4">4 Bars</option>
                                    <option value="3" selected>3 Bars (Standard Processing)</option>
                                    <option value="2">2 Bars</option>
                                    <option value="1">1 Bar (O(1) Efficiency)</option>
                                </select>
                            </div>
                            <button type="submit" id="submit-btn" class="button-retro" style="font-size:13px; padding: 5px 15px;">Commit Code upstream</button>
                            <button type="button" id="cancel-edit-btn" class="button-retro" style="font-size:13px; padding: 5px 15px; display: none; color: #555;" onclick="clearEditMode()">Abort Refactor</button>
                        </form>
                    </div>
                </div>

                <div class="box">
                    <div class="box-header">Manage Committed Indexes</div>
                    <div class="box-content" id="admin-queue"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Updated with your new project URL
        const SUPABASE_URL = "https://yxlxgjbpcgsenrdylagz.supabase.co";
        // REMINDER: Make sure to replace this template placeholder with your project's target Anon/Public Key API key string!
        const SUPABASE_ANON_KEY = "sb_publishable_WJLBK-BvHr612Mcznxx3ng__rpvjQ87";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let codeItems = [];
        let editingId = null;

        _supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('admin-interface').style.display = 'block';
                fetchQueue();
            } else {
                document.getElementById('login-overlay').style.display = 'block';
                document.getElementById('admin-interface').style.display = 'none';
            }
        });

        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const { error } = await _supabase.auth.signInWithPassword({ email, password });
            if (error) alert("Verification Denied: " + error.message);
        });

        async function handleLogout() {
            await _supabase.auth.signOut();
            alert("File system partition unmounted safely.");
        }

        async function fetchQueue() {
            let { data, error } = await _supabase.from('codes').select('*').order('id', { ascending: false });
            if (error) console.error(error);
            codeItems = data || [];
            renderQueue();
        }

        function renderQueue() {
            const queueContainer = document.getElementById('admin-queue');
            queueContainer.innerHTML = '';

            if (codeItems.length === 0) {
                queueContainer.innerHTML = '<span style="color:#666; font-style:italic;">No active indices compiled.</span>';
                return;
            }

            codeItems.forEach(item => {
                const row = document.createElement('div');
                row.style.cssText = "border-bottom: 1px dashed #CCC; padding: 6px 0; display: flex; justify-content: space-between; align-items: center;";
                row.innerHTML = `
                    <div style="max-width: 65%;">
                        <strong style="color:#0033CC; font-family: monospace;">${escapeHTML(item.file_name)}</strong><br>
                        <span style="font-size:11px; color:#666;">Title: ${escapeHTML(item.title)}</span>
                    </div>
                    <div>
                        <button class="button-retro" style="color:blue;" onclick="startEdit(${item.id})">Edit</button>
                        <button class="button-retro" style="color:red;" onclick="deleteNode(${item.id})">Delete</button>
                    </div>
                `;
                queueContainer.appendChild(row);
            });
        }

        window.startEdit = function(id) {
            const target = codeItems.find(c => c.id === id);
            if (!target) return;

            editingId = id;
            document.getElementById('code-title').value = target.title;
            document.getElementById('code-filename').value = target.file_name;
            document.getElementById('code-lang').value = target.language;
            document.getElementById('code-desc').value = target.description;
            document.getElementById('code-content').value = target.code_content;
            document.getElementById('code-complexity').value = target.complexity;

            document.getElementById('form-panel-title').innerText = "⚠️ Refactoring System Node File: " + target.file_name;
            document.getElementById('submit-btn').innerText = "Push Upstream Changes";
            document.getElementById('cancel-edit-btn').style.display = "inline-block";
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.clearEditMode = function() {
            editingId = null;
            document.getElementById('code-form').reset();
            document.getElementById('form-panel-title').innerText = "Initialize / Create Code Snippet Asset";
            document.getElementById('submit-btn').innerText = "Commit Code upstream";
            document.getElementById('cancel-edit-btn').style.display = "none";
        }

        document.getElementById('code-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const payload = {
                title: document.getElementById('code-title').value,
                file_name: document.getElementById('code-filename').value,
                language: document.getElementById('code-lang').value,
                description: document.getElementById('code-desc').value,
                code_content: document.getElementById('code-content').value,
                complexity: parseInt(document.getElementById('code-complexity').value)
            };

            if (editingId !== null) {
                const { error } = await _supabase.from('codes').update(payload).eq('id', editingId);
                if (error) alert('Update Compilation Error: ' + error.message);
                else {
                    alert('Upstream file synchronization complete!');
                    clearEditMode();
                    fetchQueue();
                }
            } else {
                payload.date = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
                payload.views = 0;

                const { error } = await _supabase.from('codes').insert([payload]);
                if (error) alert('Database Link Error: ' + error.message);
                else {
                    document.getElementById('code-form').reset();
                    alert('New directory tree node committed successfully!');
                    fetchQueue();
                }
            }
        });

        window.deleteNode = async function(id) {
            if (confirm("Wipe this system file block entry permanently?")) {
                if (editingId === id) clearEditMode();
                const { error } = await _supabase.from('codes').delete().eq('id', id);
                if (error) console.error(error);
                fetchQueue();
            }
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }
    </script>
</body>
</html>
